<!DOCTYPE html>
<html>
<head>
    <title>😂 Joke Chat Bot</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: #1e293b;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #00adb5;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #00adb5;
            align-self: flex-end;
        }

        .bot {
            background: #334155;
            align-self: flex-start;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background: #0f172a;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
        }

        button {
            margin-left: 10px;
            padding: 10px;
            border: none;
            background: #00adb5;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="header">😂 Joke Bot</div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">Hi 😄 Ask me for a joke!</div>
    </div>

    <div style="text-align:center; padding:5px;">
        <label>
            <input type="checkbox" id="sarcasmToggle">
            😏 Sarcasm Mode
        </label>
    </div>

    <div class="input-box">
        <input id="userInput" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function appendMessage(text, sender) {
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    document.getElementById("chatBox").appendChild(msg);

    // auto scroll
    document.getElementById("chatBox").scrollTop =
        document.getElementById("chatBox").scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value;
    const sarcasm = document.getElementById("sarcasmToggle").checked;

    if (!message) return;

    appendMessage(message, "user");

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ 
            message: message,
            sarcasm: sarcasm
        })
    })
    .then(res => res.json())
    .then(data => {
        setTimeout(() => {
            appendMessage(data.reply, "bot");
        }, 500);
    });

    input.value = "";
}

// enter key support
document.getElementById("userInput")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
